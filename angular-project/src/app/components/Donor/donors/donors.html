<p> Donors </p>

<button (click)="addDonor()"> Add Donor </button>
<div class="filter-box">
  <input class="small-input" [(ngModel)]="firstNameFilter" placeholder="First Name">
  <input class="small-input" [(ngModel)]="lastNameFilter" placeholder="Last Name">
</div>


<button (click)="searchByName()">Search</button>
<button (click)="clearFilter()">Clear</button>
<table>
  <thead>
    <tr>
      <th>firstName</th>
      <th>lastName</th>
      <th>phone</th>
      <th>email</th>
      <th>address</th>
    </tr>
  </thead>

  <tbody>
    @for(d of donors$ | async; track d.id){
      <tr>
        <td>{{d.firstName}}</td>
        <td>{{d.lastName}}</td>
        <td>{{d.phoneNumber}}</td>
        <td>{{d.email}}</td>
        <td>{{d.address}}</td>

        <button (click)="delete(d.id)" [disabled]="donorIdsWithGifts.has(d.id)" title="{{ donorIdsWithGifts.has(d.id) ? 'Cannot delete donor with gifts' : '' }}"> Delete Donor </button>
        <button (click)="updateDonor(d.firstName, d.lastName)">Update Donor</button>
    }
  </tbody>
</table>
